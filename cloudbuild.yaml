steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/aiagents-490508/augmont-voice-agents/app:$BUILD_ID'
      - '-t'
      - 'asia-south1-docker.pkg.dev/aiagents-490508/augmont-voice-agents/app:latest'
      - '.'
    timeout: '1200s'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/aiagents-490508/augmont-voice-agents/app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'augmont-voice-agents'
      - '--image'
      - 'asia-south1-docker.pkg.dev/aiagents-490508/augmont-voice-agents/app:$BUILD_ID'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--add-cloudsql-instances'
      - 'aiagents-490508:asia-south1:augmont-db'
      - '--update-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,BOLNA_API_KEY=BOLNA_API_KEY:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,BOLNA_API_BASE_URL=https://api.bolna.ai'

images:
  - 'asia-south1-docker.pkg.dev/aiagents-490508/augmont-voice-agents/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
