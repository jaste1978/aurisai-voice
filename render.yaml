# Render Blueprint — AurisAI Voice platform (voice.aurisaivoice.com)
# Always-on Docker web service (NestJS + built React) + managed PostgreSQL.
# Create via Render → New → Blueprint, then point this repo at it.

services:
  - type: web
    name: aurisai-voice
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore        # closest Render region to India
    plan: starter            # always-on ($7/mo) — required: free plan sleeps and would freeze the call-pollers
    healthCheckPath: /        # served React index.html → 200
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOLNA_API_BASE_URL
        value: https://api.bolna.ai
      - key: BOLNA_API_KEY
        sync: false           # set in the Render dashboard (do NOT commit)
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret once
      - key: WEBHOOK_URL
        sync: false           # set to https://voice.aurisaivoice.com/webhooks/bolna once the domain is live
      - key: DATABASE_URL
        fromDatabase:
          name: aurisai-voice-db
          property: connectionString

databases:
  - name: aurisai-voice-db
    region: singapore
    plan: basic-256mb         # small paid Postgres (~$6-7/mo); adjust in dashboard if you prefer
    postgresMajorVersion: "16"
